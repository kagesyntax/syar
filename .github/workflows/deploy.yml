name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Dioxus CLI
        # We use a specific version to ensure behavior is consistent
        run: cargo install dioxus-cli --version 0.6.0

      - name: Build Dioxus App
        # We explicitly tell it where to put the files just in case
        run: dx build --release --platform web --outdir dist

      - name: Check where files went
        # This command is our insurance policy. It lists all files.
        run: find . -maxdepth 3 -not -path '*/.*'

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
