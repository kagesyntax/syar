name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli --force

      - name: Build Dioxus App
        # This is the command that creates the 'dist' folder
        run: dx build --release --platform web

      - name: List files for debugging
        # If this fails, we will see exactly what folder was created
        run: ls -F

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Dioxus 0.6+ ALWAYS outputs to ./dist by default
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
